<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Whogos - We make life easy</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
body {
  margin:0;
  font-family:'Roboto', sans-serif;
  background: linear-gradient(135deg,#eaf3ff,#f7f9fc);
}

/* HEADER */
header {
  background:#1e4fa3;
  color:white;
  display:flex;
  justify-content:space-between;
  padding:1em 2em;
}

header nav a {
  color:white;
  margin-left:20px;
  cursor:pointer;
  text-decoration:none;
}

/* HERO */
.hero {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:2em;
  background: linear-gradient(120deg,#4facfe,#ff7f50);
  border-radius:15px;
  color:white;
  margin:2em;
}

.hero img {
  width:420px;
  border-radius:12px;
}

.hero button {
  padding:12px 20px;
  border:none;
  background:white;
  color:#ff7f50;
  border-radius:8px;
  cursor:pointer;
}

/* CATEGORY */
.category-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:1em;
  padding:2em;
}

.category {
  background:white;
  padding:1em;
  border-radius:10px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* SERVICES */
.service-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:1em;
  padding:2em;
}

.service-card {
  background:white;
  padding:1em;
  border-radius:10px;
  text-align:center;
}

.service-card img {
  width:100%;
  border-radius:10px;
}

/* FORM */
form {
  background:white;
  padding:2em;
  border-radius:10px;
  max-width:400px;
  margin:2em;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:1em;
}

/* TABS */
.tab { display:none; }
.tab.active { display:block; }

</style>
</head>

<body>

<nav>
